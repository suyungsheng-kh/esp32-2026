<body class="bg-ios-bg text-ios-text antialiased">
  <div id="root"></div>

  <script type="text/babel" data-type="module" data-presets="react">
    import React, { useState, useEffect, useRef, useCallback } from 'react';
    import { createRoot } from 'react-dom/client';

    // 定義深中淺的隨機配色組合
    const WIRE_SETS = [
      { name: '黃綠藍', GND: { hex: '#007AFF', name: '藍' }, VCC: { hex: '#34C759', name: '綠' }, SIG: { hex: '#FFCC00', name: '黃' } },
      { name: '棕紅橘', GND: { hex: '#A0522D', name: '棕' }, VCC: { hex: '#FF3B30', name: '紅' }, SIG: { hex: '#FF9500', name: '橘' } },
      { name: '黑紫白', GND: { hex: '#1C1C1E', name: '黑' }, VCC: { hex: '#AF52DE', name: '紫' }, SIG: { hex: '#E5E5EA', name: '白' } }
    ];

    // 更新：嚴格檢查電源與接地是否與訊號 (targetPins) 在「同一排」
    const checkPower = (modConns, targetPins, vccPin = 'VCC', gndPin = 'GND') => {
      let vcc = false, gnd = false;
      
      // 根據目標腳位，動態產生允許的對應 V 與 G 腳位名稱 (例如：IO4_V, IO4_G)
      const allowedV = targetPins.map(p => `${p}_V`);
      const allowedG = targetPins.map(p => `${p}_G`);
      
      modConns.forEach(c => {
        if (vccPin && c.modulePin === vccPin && allowedV.includes(c.shieldPin)) vcc = true;
        if (gndPin && c.modulePin === gndPin && allowedG.includes(c.shieldPin)) gnd = true;
      });
      
      // 若該模組不需 VCC (vccPin為null)，則預設回傳 true
      return { vcc: vccPin ? vcc : true, gnd: gndPin ? gnd : true };
    };

    const TASKS = [
      // ================= 輸出模組 =================
      {
        id: 'led_y', type: 'output', name: '🟡 LED (黃)', desc: '將 SIG 接 pin 4，並配對旁邊的 V 與 G。',
        pins: [{ id: 'GND', label: 'GND', color: '#1f2937' }, { id: 'VCC', label: 'VCC', color: '#ef4444' }, { id: 'SIG', label: 'SIG', color: '#FFCC00' }],
        validate: (modConns) => {
          const sig = modConns.some(c => c.modulePin === 'SIG' && c.shieldPin === 'IO4_S');
          const { vcc, gnd } = checkPower(modConns, ['IO4']);
          if (vcc && gnd && sig) return { success: true, msg: '接線正確！成功點亮黃色 LED。' };
          if (!sig) return { success: false, msg: '訊號線請接在 pin 4 的 S 腳位。' };
          return { success: false, msg: '請將 VCC 與 GND 接在 pin 4 旁邊對應的 V 與 G 腳位。' };
        }
      },
      {
        id: 'led_r', type: 'output', name: '🔴 LED (紅)', desc: '將 SIG 接 pin 5，並配對旁邊的 V 與 G。',
        pins: [{ id: 'GND', label: 'GND', color: '#1f2937' }, { id: 'VCC', label: 'VCC', color: '#ef4444' }, { id: 'SIG', label: 'SIG', color: '#FF3B30' }],
        validate: (modConns) => {
          const sig = modConns.some(c => c.modulePin === 'SIG' && c.shieldPin === 'IO5_S');
          const { vcc, gnd } = checkPower(modConns, ['IO5']);
          if (vcc && gnd && sig) return { success: true, msg: '接線正確！成功點亮紅色 LED。' };
          if (!sig) return { success: false, msg: '訊號線請接在 pin 5 的 S 腳位。' };
          return { success: false, msg: '請將 VCC 與 GND 接在 pin 5 旁邊對應的 V 與 G 腳位。' };
        }
      },
      {
        id: 'led_g', type: 'output', name: '🟢 LED (綠)', desc: '將 SIG 接 pin 18，並配對旁邊的 V 與 G。',
        pins: [{ id: 'GND', label: 'GND', color: '#1f2937' }, { id: 'VCC', label: 'VCC', color: '#ef4444' }, { id: 'SIG', label: 'SIG', color: '#34C759' }],
        validate: (modConns) => {
          const sig = modConns.some(c => c.modulePin === 'SIG' && c.shieldPin === 'IO18_S');
          const { vcc, gnd } = checkPower(modConns, ['IO18']);
          if (vcc && gnd && sig) return { success: true, msg: '接線正確！成功點亮綠色 LED。' };
          if (!sig) return { success: false, msg: '訊號線請接在 pin 18 的 S 腳位。' };
          return { success: false, msg: '請將 VCC 與 GND 接在 pin 18 旁邊對應的 V 與 G 腳位。' };
        }
      },
      {
        id: 'led_rgb', type: 'output', name: '🌈 LED (RGB)', desc: 'R, G, B 分別接 pin 25, 26, 27，GND 配對其中一組。',
        pins: [
          { id: 'GND', label: 'GND', color: '#1f2937' }, { id: 'R', label: 'R', color: '#FF3B30' },
          { id: 'G', label: 'G', color: '#34C759' }, { id: 'B', label: 'B', color: '#007AFF' }
        ],
        validate: (modConns) => {
          const r = modConns.some(c => c.modulePin === 'R' && c.shieldPin === 'IO25_S');
          const g = modConns.some(c => c.modulePin === 'G' && c.shieldPin === 'IO26_S');
          const b = modConns.some(c => c.modulePin === 'B' && c.shieldPin === 'IO27_S');
          const { gnd } = checkPower(modConns, ['IO25', 'IO26', 'IO27'], null, 'GND');
          if (gnd && r && g && b) return { success: true, msg: '接線正確！現在可以控制 RGB 顏色了。' };
          if (!(r && g && b)) return { success: false, msg: 'R, G, B 訊號請分別接至 pin 25, 26, 27。' };
          return { success: false, msg: 'GND 需接在 pin 25, 26 或 27 同排的 G 腳位上。' };
        }
      },
      {
        id: 'ws2812', type: 'output', name: '⭕ WS2812 環狀燈', desc: '將 DIN 接 pin 19，並配對旁邊的 V 與 G。',
        pins: [{ id: 'GND', label: 'GND', color: '#1f2937' }, { id: 'VCC', label: 'VCC', color: '#ef4444' }, { id: 'DIN', label: 'DIN', color: '#FFCC00' }],
        validate: (modConns) => {
          const sig = modConns.some(c => c.modulePin === 'DIN' && c.shieldPin === 'IO19_S');
          const { vcc, gnd } = checkPower(modConns, ['IO19']);
          if (vcc && gnd && sig) return { success: true, msg: '接線正確！準備發出炫麗光芒。' };
          if (!sig) return { success: false, msg: 'DIN 訊號請接在 pin 19 的 S 腳位。' };
          return { success: false, msg: '請將 VCC 與 GND 接在 pin 19 旁邊對應的 V 與 G 腳位。' };
        }
      },
      {
        id: 'buzzer', type: 'output', name: '🔔 蜂鳴器', desc: '將 I/O 接 pin 21，並配對旁邊的 V 與 G。',
        pins: [{ id: 'GND', label: 'GND', color: '#1f2937' }, { id: 'VCC', label: 'VCC', color: '#ef4444' }, { id: 'IO', label: 'I/O', color: '#5856D6' }],
        validate: (modConns) => {
          const sig = modConns.some(c => c.modulePin === 'IO' && c.shieldPin === 'IO21_S');
          const { vcc, gnd } = checkPower(modConns, ['IO21']);
          if (vcc && gnd && sig) return { success: true, msg: '接線正確！蜂鳴器已就緒。' };
          if (!sig) return { success: false, msg: 'I/O 訊號請接在 pin 21 的 S 腳位。' };
          return { success: false, msg: '請將 VCC 與 GND 接在 pin 21 旁邊對應的 V 與 G 腳位。' };
        }
      },
      {
        id: 'relay', type: 'output', name: '⚡ 繼電器與風扇', desc: '將 IN 接 pin 22，並配對旁邊的 V 與 G。',
        pins: [{ id: 'GND', label: 'GND', color: '#1f2937' }, { id: 'VCC', label: 'VCC', color: '#ef4444' }, { id: 'IN', label: 'IN', color: '#FF9500' }],
        validate: (modConns) => {
          const sig = modConns.some(c => c.modulePin === 'IN' && c.shieldPin === 'IO22_S');
          const { vcc, gnd } = checkPower(modConns, ['IO22']);
          if (vcc && gnd && sig) return { success: true, msg: '接線正確！繼電器隨時可以作動。' };
          if (!sig) return { success: false, msg: 'IN 訊號請接在 pin 22 的 S 腳位。' };
          return { success: false, msg: '請將 VCC 與 GND 接在 pin 22 旁邊對應的 V 與 G 腳位。' };
        }
      },

      // ================= 輸入模組 =================
      {
        id: 'btn_y', type: 'input', name: '🟡 按鈕 (黃)', desc: '將 OUT 接 pin 12，並配對旁邊的 V 與 G。',
        pins: [{ id: 'GND', label: 'GND', color: '#1f2937' }, { id: 'VCC', label: 'VCC', color: '#ef4444' }, { id: 'OUT', label: 'OUT', color: '#FFCC00' }],
        validate: (modConns) => {
          const sig = modConns.some(c => c.modulePin === 'OUT' && c.shieldPin === 'IO12_S');
          const { vcc, gnd } = checkPower(modConns, ['IO12']);
          if (vcc && gnd && sig) return { success: true, msg: '接線正確！可以偵測按壓了。' };
          if (!sig) return { success: false, msg: 'OUT 訊號請接在 pin 12 的 S 腳位。' };
          return { success: false, msg: '請將 VCC 與 GND 接在 pin 12 旁邊對應的 V 與 G 腳位。' };
        }
      },
      {
        id: 'btn_r', type: 'input', name: '🔴 按鈕 (紅)', desc: '將 OUT 接 pin 13，並配對旁邊的 V 與 G。',
        pins: [{ id: 'GND', label: 'GND', color: '#1f2937' }, { id: 'VCC', label: 'VCC', color: '#ef4444' }, { id: 'OUT', label: 'OUT', color: '#FF3B30' }],
        validate: (modConns) => {
          const sig = modConns.some(c => c.modulePin === 'OUT' && c.shieldPin === 'IO13_S');
          const { vcc, gnd } = checkPower(modConns, ['IO13']);
          if (vcc && gnd && sig) return { success: true, msg: '接線正確！可以偵測按壓了。' };
          if (!sig) return { success: false, msg: 'OUT 訊號請接在 pin 13 的 S 腳位。' };
          return { success: false, msg: '請將 VCC 與 GND 接在 pin 13 旁邊對應的 V 與 G 腳位。' };
        }
      },
      {
        id: 'btn_g', type: 'input', name: '🟢 按鈕 (綠)', desc: '將 OUT 接 pin 14，並配對旁邊的 V 與 G。',
        pins: [{ id: 'GND', label: 'GND', color: '#1f2937' }, { id: 'VCC', label: 'VCC', color: '#ef4444' }, { id: 'OUT', label: 'OUT', color: '#34C759' }],
        validate: (modConns) => {
          const sig = modConns.some(c => c.modulePin === 'OUT' && c.shieldPin === 'IO14_S');
          const { vcc, gnd } = checkPower(modConns, ['IO14']);
          if (vcc && gnd && sig) return { success: true, msg: '接線正確！可以偵測按壓了。' };
          if (!sig) return { success: false, msg: 'OUT 訊號請接在 pin 14 的 S 腳位。' };
          return { success: false, msg: '請將 VCC 與 GND 接在 pin 14 旁邊對應的 V 與 G 腳位。' };
        }
      },
      {
        id: 'potentiometer', type: 'input', name: '🎛️ 可變電阻', desc: '將 OUT 接 pin 32，並配對旁邊的 V 與 G。',
        pins: [{ id: 'GND', label: 'GND', color: '#1f2937' }, { id: 'VCC', label: 'VCC', color: '#ef4444' }, { id: 'OUT', label: 'OUT', color: '#007AFF' }],
        validate: (modConns) => {
          const sig = modConns.some(c => c.modulePin === 'OUT' && c.shieldPin === 'IO32_S');
          const { vcc, gnd } = checkPower(modConns, ['IO32']);
          if (vcc && gnd && sig) return { success: true, msg: '接線正確！現在可以讀取旋鈕數值了。' };
          if (!sig) return { success: false, msg: 'OUT 訊號請接在 pin 32 的 S 腳位。' };
          return { success: false, msg: '請將 VCC 與 GND 接在 pin 32 旁邊對應的 V 與 G 腳位。' };
        }
      },
      {
        id: 'photoresistor', type: 'input', name: '☀️ 光敏電阻', desc: '將 AO 接 pin 33，並配對旁邊的 V 與 G。',
        pins: [{ id: 'GND', label: 'GND', color: '#1f2937' }, { id: 'VCC', label: 'VCC', color: '#ef4444' }, { id: 'AO', label: 'AO', color: '#5856D6' }],
        validate: (modConns) => {
          const sig = modConns.some(c => c.modulePin === 'AO' && c.shieldPin === 'IO33_S');
          const { vcc, gnd } = checkPower(modConns, ['IO33']);
          if (vcc && gnd && sig) return { success: true, msg: '接線正確！開始偵測環境光線。' };
          if (!sig) return { success: false, msg: 'AO 訊號請接在 pin 33 的 S 腳位。' };
          return { success: false, msg: '請將 VCC 與 GND 接在 pin 33 旁邊對應的 V 與 G 腳位。' };
        }
      },
      {
        id: 'dht', type: 'input', name: '🌡️ 溫濕度', desc: '將 DATA 接 pin 23，並配對旁邊的 V 與 G。',
        pins: [{ id: 'GND', label: 'GND', color: '#1f2937' }, { id: 'VCC', label: 'VCC', color: '#ef4444' }, { id: 'DATA', label: 'DATA', color: '#5AC8FA' }],
        validate: (modConns) => {
          const sig = modConns.some(c => c.modulePin === 'DATA' && c.shieldPin === 'IO23_S');
          const { vcc, gnd } = checkPower(modConns, ['IO23']);
          if (vcc && gnd && sig) return { success: true, msg: '接線正確！準備讀取溫濕度資料。' };
          if (!sig) return { success: false, msg: 'DATA 訊號請接在 pin 23 的 S 腳位。' };
          return { success: false, msg: '請將 VCC 與 GND 接在 pin 23 旁邊對應的 V 與 G 腳位。' };
        }
      },
      {
        id: 'soil', type: 'input', name: '🌱 土壤濕度', desc: '將 AO 接 pin 34，並配對旁邊的 V 與 G。',
        pins: [{ id: 'GND', label: 'GND', color: '#1f2937' }, { id: 'VCC', label: 'VCC', color: '#ef4444' }, { id: 'AO', label: 'AO', color: '#AF52DE' }],
        validate: (modConns) => {
          const sig = modConns.some(c => c.modulePin === 'AO' && c.shieldPin === 'IO34_S');
          const { vcc, gnd } = checkPower(modConns, ['IO34']);
          if (vcc && gnd && sig) return { success: true, msg: '接線正確！可測量土壤水份了。' };
          if (!sig) return { success: false, msg: 'AO 訊號請接在 pin 34 的 S 腳位。' };
          return { success: false, msg: '請將 VCC 與 GND 接在 pin 34 旁邊對應的 V 與 G 腳位。' };
        }
      },
      {
        id: 'water_temp', type: 'input', name: '💧 水溫', desc: '將 DATA 接 pin 16，並配對旁邊的 V 與 G。',
        pins: [{ id: 'GND', label: 'GND', color: '#1f2937' }, { id: 'VCC', label: 'VCC', color: '#ef4444' }, { id: 'DATA', label: 'DATA', color: '#007AFF' }],
        validate: (modConns) => {
          const sig = modConns.some(c => c.modulePin === 'DATA' && c.shieldPin === 'IO16_S');
          const { vcc, gnd } = checkPower(modConns, ['IO16']);
          if (vcc && gnd && sig) return { success: true, msg: '接線正確！準備測量水溫。' };
          if (!sig) return { success: false, msg: 'DATA 訊號請接在 pin 16 的 S 腳位。' };
          return { success: false, msg: '請將 VCC 與 GND 接在 pin 16 旁邊對應的 V 與 G 腳位。' };
        }
      }
    ];

    // ESP32 擴充板腳位定義
    const LEFT_PINS = [
      { id: '3V3', label: '3.3V', type: 'power', color: '#FF3B30' },
      { id: 'EN', label: 'EN', type: 'ctrl', color: '#007AFF' },
      { id: 'IO36', label: '36', type: 'io' }, { id: 'IO39', label: '39', type: 'io' },
      { id: 'IO34', label: '34', type: 'io' }, { id: 'IO35', label: '35', type: 'io' },
      { id: 'IO32', label: '32', type: 'io' }, { id: 'IO33', label: '33', type: 'io' },
      { id: 'IO25', label: '25', type: 'io' }, { id: 'IO26', label: '26', type: 'io' },
      { id: 'IO27', label: '27', type: 'io' }, { id: 'IO14', label: '14', type: 'io' },
      { id: 'IO12', label: '12', type: 'io' },
      { id: 'GND_L', label: 'GND', type: 'power', color: '#1C1C1E' },
      { id: 'IO13', label: '13', type: 'io' }, { id: 'IO9', label: '9', type: 'io' },
      { id: 'IO10', label: '10', type: 'io' }, { id: 'IO11', label: '11', type: 'io' },
      { id: '5V', label: '5V', type: 'power', color: '#FF3B30' }
    ];

    const RIGHT_PINS = [
      { id: 'GND_R1', label: 'GND', type: 'power', color: '#1C1C1E' },
      { id: 'IO23', label: '23', type: 'io' }, { id: 'IO22', label: '22', type: 'io' },
      { id: 'TX0', label: 'TX0', type: 'io' }, { id: 'RX0', label: 'RX0', type: 'io' },
      { id: 'IO21', label: '21', type: 'io' },
      { id: 'GND_R2', label: 'GND', type: 'power', color: '#1C1C1E' },
      { id: 'IO19', label: '19', type: 'io' }, { id: 'IO18', label: '18', type: 'io' },
      { id: 'IO5', label: '5', type: 'io' }, { id: 'IO17', label: '17', type: 'io' },
      { id: 'IO16', label: '16', type: 'io' }, { id: 'IO4', label: '4', type: 'io' },
      { id: 'IO0', label: '0', type: 'io' }, { id: 'IO2', label: '2', type: 'io' },
      { id: 'IO15', label: '15', type: 'io' }, { id: 'IO8', label: '8', type: 'io' },
      { id: 'IO7', label: '7', type: 'io' }, { id: 'IO6', label: '6', type: 'io' }
    ];

    function App() {
      const [workspaceModules, setWorkspaceModules] = useState([]);
      const [connections, setConnections] = useState([]);
      const [activePin, setActivePin] = useState(null); 
      const [wireCoords, setWireCoords] = useState([]);
      const [feedbacks, setFeedbacks] = useState(null); 
      const [mousePos, setMousePos] = useState({ x: 0, y: 0 });
      
      // 新增狀態：深中淺練習模式
      const [randomColorMode, setRandomColorMode] = useState(false);
      
      const containerRef = useRef(null);

      const updateCoords = useCallback(() => {
        if (!containerRef.current) return;
        const containerRect = containerRef.current.getBoundingClientRect();
        
        const newCoords = connections.map(conn => {
          const modEl = document.getElementById(`pin-module-${conn.moduleId}-${conn.modulePin}`);
          const shieldEl = document.getElementById(`pin-shield-${conn.shieldPin}`);
          
          if (!modEl || !shieldEl) return null;

          const modRect = modEl.getBoundingClientRect();
          const shieldRect = shieldEl.getBoundingClientRect();

          return {
            id: conn.id, color: conn.color,
            x1: modRect.left - containerRect.left + modRect.width / 2,
            y1: modRect.top - containerRect.top + modRect.height / 2,
            x2: shieldRect.left - containerRect.left + shieldRect.width / 2,
            y2: shieldRect.top - containerRect.top + shieldRect.height / 2,
          };
        }).filter(Boolean);
        
        setWireCoords(newCoords);
      }, [connections, workspaceModules]);

      useEffect(() => {
        window.addEventListener('resize', updateCoords);
        const timer = setTimeout(updateCoords, 50);
        return () => { window.removeEventListener('resize', updateCoords); clearTimeout(timer); };
      }, [updateCoords]);

      const handleMouseMove = (e) => {
        if (activePin && containerRef.current) {
          const rect = containerRef.current.getBoundingClientRect();
          setMousePos({ x: e.clientX - rect.left, y: e.clientY - rect.top });
        }
      };

      const addModule = (taskTemplate) => {
        const newId = `${taskTemplate.id}_${Date.now()}`;
        
        // 深複製 pins 陣列，避免改到模板
        let newPins = taskTemplate.pins.map(p => ({ ...p }));
        
        // 如果開啟了「深中淺模式」，就隨機套用顏色組合
        if (randomColorMode) {
          const randomSet = WIRE_SETS[Math.floor(Math.random() * WIRE_SETS.length)];
          newPins = newPins.map(pin => {
            if (pin.id === 'GND') return { ...pin, color: randomSet.GND.hex, colorName: randomSet.GND.name };
            if (pin.id === 'VCC') return { ...pin, color: randomSet.VCC.hex, colorName: randomSet.VCC.name };
            // 除了 RGB 特定顏色外，其餘訊號線套用隨機的淺色
            if (!['R', 'G', 'B'].includes(pin.id)) return { ...pin, color: randomSet.SIG.hex, colorName: randomSet.SIG.name };
            return pin;
          });
        }

        setWorkspaceModules([...workspaceModules, { ...taskTemplate, instanceId: newId, pins: newPins }]);
        setFeedbacks(null);
      };

      const removeModule = (instanceId) => {
        setWorkspaceModules(prev => prev.filter(m => m.instanceId !== instanceId));
        setConnections(prev => prev.filter(c => c.moduleId !== instanceId));
        setFeedbacks(null);
        if (activePin?.moduleId === instanceId) setActivePin(null);
      };

      const handlePinClick = (type, pinId, color = '#8E8E93', moduleId = null) => {
        setFeedbacks(null);
        
        if (!activePin) {
          setActivePin({ type, id: pinId, color, moduleId });
          const elId = type === 'module' ? `pin-module-${moduleId}-${pinId}` : `pin-shield-${pinId}`;
          const el = document.getElementById(elId);
          if (el && containerRef.current) {
            const rect = el.getBoundingClientRect();
            const containerRect = containerRef.current.getBoundingClientRect();
            setMousePos({
              x: rect.left - containerRect.left + rect.width / 2,
              y: rect.top - containerRect.top + rect.height / 2
            });
          }
        } else {
          if (activePin.type === type) {
            if (activePin.id === pinId && activePin.moduleId === moduleId) setActivePin(null);
            else setActivePin({ type, id: pinId, color, moduleId });
            return;
          }

          const modPin = activePin.type === 'module' ? activePin : { id: pinId, moduleId, color };
          const shPin = activePin.type === 'shield' ? activePin : { id: pinId, color };

          const newConns = connections.filter(
            c => !(c.moduleId === modPin.moduleId && c.modulePin === modPin.id) && c.shieldPin !== shPin.id
          );

          setConnections([
            ...newConns,
            { 
              id: `${modPin.moduleId}-${modPin.id}-${shPin.id}`, 
              moduleId: modPin.moduleId, modulePin: modPin.id, shieldPin: shPin.id, 
              color: activePin.type === 'module' ? activePin.color : color 
            }
          ]);
          setActivePin(null);
        }
      };

      const removeConnection = (id) => {
        setConnections(connections.filter(c => c.id !== id));
        setFeedbacks(null);
      };

      const checkWiring = () => {
        if (workspaceModules.length === 0) return;
        const results = workspaceModules.map(mod => {
          const modConns = connections.filter(c => c.moduleId === mod.instanceId);
          return { name: mod.name, ...mod.validate(modConns) };
        });
        setFeedbacks(results);
      };

      const createCurve = (x1, y1, x2, y2) => {
        const dx = Math.abs(x2 - x1);
        const offset = Math.max(dx * 0.4, 50);
        return `M ${x1} ${y1} C ${x1 + offset} ${y1}, ${x2 - offset} ${y2}, ${x2} ${y2}`;
      };

      const getActivePinCoords = () => {
        if (!activePin || !containerRef.current) return null;
        const elId = activePin.type === 'module' 
          ? `pin-module-${activePin.moduleId}-${activePin.id}` : `pin-shield-${activePin.id}`;
        const el = document.getElementById(elId);
        if (!el) return null;
        const rect = el.getBoundingClientRect();
        const containerRect = containerRef.current.getBoundingClientRect();
        return {
          x: rect.left - containerRect.left + rect.width / 2,
          y: rect.top - containerRect.top + rect.height / 2
        };
      };

      const activeCoords = getActivePinCoords();

      const outputModules = workspaceModules.filter(m => m.type === 'output');
      const inputModules = workspaceModules.filter(m => m.type === 'input');

      const renderModuleCard = (mod) => (
        <div key={mod.instanceId} className="bg-ios-card p-5 rounded-3xl shadow-[0_4px_24px_rgba(0,0,0,0.06)] border border-ios-grayLight flex flex-col items-center relative w-full shrink-0">
          <button 
            onClick={() => removeModule(mod.instanceId)} 
            className="absolute -top-2 -right-2 bg-ios-grayLight text-ios-gray hover:bg-ios-red hover:text-white w-7 h-7 rounded-full flex items-center justify-center text-sm transition-colors shadow-sm"
            title="刪除模組"
          ><i className="fa-solid fa-xmark"></i></button>
          
          <div className="text-ios-text font-semibold mb-1 text-[15px] tracking-tight">
            {mod.name}
          </div>
          <div className="text-[12px] text-ios-gray mb-5 text-center leading-snug px-2">
            {mod.desc}
          </div>
          
          <div className="flex flex-col gap-3 w-full px-2">
            {mod.pins.map(pin => {
              const isActive = activePin?.type === 'module' && activePin?.id === pin.id && activePin?.moduleId === mod.instanceId;
              const isConnected = connections.some(c => c.moduleId === mod.instanceId && c.modulePin === pin.id);
              return (
                <div key={pin.id} className="flex items-center justify-between">
                  <span className="text-ios-gray font-mono text-[13px] font-medium flex items-center">
                    {pin.label}
                    {/* 顯示被隨機分配的線材顏色名稱 */}
                    {pin.colorName && (
                      <span className="text-[10px] ml-1.5 px-1.5 py-0.5 rounded-md bg-ios-bg border border-ios-grayLight text-ios-text shadow-sm whitespace-nowrap">
                        {pin.colorName}線
                      </span>
                    )}
                  </span>
                  <button
                    id={`pin-module-${mod.instanceId}-${pin.id}`}
                    onClick={() => handlePinClick('module', pin.id, pin.color, mod.instanceId)}
                    className={`w-6 h-6 rounded-full border-[2.5px] transition-all flex items-center justify-center ${
                      isActive ? 'border-ios-blue scale-110 shadow-md bg-ios-blue/10' : 
                      isConnected ? 'border-ios-gray bg-ios-grayLight' : 'border-ios-separator bg-white hover:border-ios-gray'
                    }`}
                    title={`連接 ${pin.label}`}
                  >
                    {(isActive || isConnected) && <div className={`w-2.5 h-2.5 rounded-full ${isActive ? 'bg-ios-blue' : 'bg-ios-gray'}`}></div>}
                  </button>
                </div>
              );
            })}
          </div>
        </div>
      );

      const ModuleListGroup = ({ title, type }) => (
        <div className="mb-6">
          <h3 className="text-[13px] font-semibold text-ios-gray uppercase tracking-wider mb-2 px-4">{title}</h3>
          <div className="bg-ios-card rounded-[10px] overflow-hidden border border-ios-grayLight mx-4 shadow-sm">
            {TASKS.filter(t => t.type === type).map((task, idx, arr) => (
              <button
                key={task.id}
                onClick={() => addModule(task)}
                className={`w-full text-left px-4 py-3 flex justify-between items-center bg-ios-card active:bg-ios-grayLight/50 transition-colors ${
                  idx !== arr.length - 1 ? 'border-b border-ios-grayLight' : ''
                }`}
              >
                <span className="text-[15px] font-medium text-ios-text">{task.name}</span>
                <div className="w-6 h-6 rounded-full bg-ios-blue/10 text-ios-blue flex items-center justify-center font-bold text-sm">
                  <i className="fa-solid fa-plus"></i>
                </div>
              </button>
            ))}
          </div>
        </div>
      );

      return (
        <div className="h-screen w-full bg-ios-bg text-ios-text font-sans flex flex-col overflow-hidden">
          
          <header className="bg-ios-card/80 backdrop-blur-xl border-b border-ios-grayLight px-6 py-4 flex justify-between items-center shrink-0 z-30">
            <h1 className="text-[17px] font-semibold tracking-tight flex items-center gap-2">
              <i className="fa-solid fa-bolt text-ios-yellow"></i> ESP32 接線練習
            </h1>
            <div className="text-[13px] font-medium text-ios-gray">
              點擊列表加入模組，連接對應腳位
            </div>
          </header>

          <div className="flex flex-1 overflow-hidden relative">
            
            <aside className="w-[300px] bg-ios-bg border-r border-ios-grayLight flex flex-col z-20 shrink-0 h-full">
              <div className="flex-1 overflow-y-auto pt-6 pb-2 custom-scrollbar">
                
                {/* 🎨 深中淺練習模式開關 */}
                <div className="mx-4 mb-6 bg-[#FFFFFF] rounded-[10px] p-4 border border-ios-grayLight shadow-sm">
                  <div className="flex justify-between items-center mb-3">
                    <span className="text-[14px] font-semibold text-ios-text flex items-center gap-2">
                      <i className="fa-solid fa-palette text-[#AF52DE]"></i> 深中淺練習模式
                    </span>
                    <button 
                      onClick={() => setRandomColorMode(!randomColorMode)} 
                      className={`w-[44px] h-[24px] rounded-full transition-colors relative shadow-inner ${randomColorMode ? 'bg-[#34C759]' : 'bg-[#E5E5EA]'}`}
                    >
                       <div className={`w-[20px] h-[20px] bg-white rounded-full shadow-sm absolute top-[2px] transition-transform ${randomColorMode ? 'translate-x-[22px]' : 'translate-x-[2px]'}`}></div>
                    </button>
                  </div>
                  <div className="text-[12px] text-ios-gray leading-relaxed">
                    開啟後，加入模組會隨機獲得以下線材。請根據顏色判斷連接位置！<br/>
                    <ul className="mt-1 space-y-0.5">
                      <li>• <b>深色 (GND)：</b>黑、棕、藍</li>
                      <li>• <b>中色 (VCC)：</b>紅、紫、綠</li>
                      <li>• <b>淺色 (訊號)：</b>黃、橘、白</li>
                    </ul>
                  </div>
                </div>

                <ModuleListGroup title="輸出模組 (Output)" type="output" />
                <ModuleListGroup title="輸入模組 (Input)" type="input" />
              </div>
              
              <div className="p-4 bg-ios-bg border-t border-ios-grayLight shrink-0 flex flex-col gap-3">
                <button 
                  onClick={() => { setWorkspaceModules([]); setConnections([]); setFeedbacks(null); setActivePin(null); }}
                  className="w-full bg-ios-card text-ios-red font-medium py-3 rounded-xl transition-all active:bg-ios-grayLight border border-ios-grayLight shadow-sm"
                >
                  清空工作區
                </button>
                <button 
                  onClick={checkWiring}
                  disabled={workspaceModules.length === 0}
                  className="w-full bg-ios-blue disabled:bg-ios-blue/50 text-white font-semibold py-3 rounded-xl transition-all active:scale-[0.98] shadow-sm flex justify-center items-center gap-2"
                >
                  <i className="fa-solid fa-check"></i> 檢查接線邏輯
                </button>
              </div>
            </aside>

            <main className="flex-1 flex flex-col relative h-full overflow-hidden bg-[#F2F2F7]">
              
              <div className="absolute top-0 w-full z-30 px-6 py-4 pointer-events-none flex flex-col items-center">
                {workspaceModules.length > 0 && feedbacks && (
                  <div className="pointer-events-auto bg-ios-card/90 backdrop-blur-xl border border-ios-grayLight shadow-lg rounded-2xl w-full max-w-3xl p-4 flex flex-col gap-3 transition-all">
                    <div className="flex justify-between items-center px-1">
                       <h3 className="text-[13px] font-semibold text-ios-gray uppercase tracking-wide">檢查結果</h3>
                       <button onClick={() => setFeedbacks(null)} className="text-ios-gray hover:text-ios-text"><i className="fa-solid fa-xmark"></i></button>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                      {feedbacks.map((f, i) => (
                        <div key={i} className={`p-3 rounded-xl border flex items-start gap-2 text-[14px] leading-snug ${f.success ? 'bg-[#E3F2FD] border-[#90CAF9] text-[#1565C0]' : 'bg-[#FFEBEE] border-[#FFCDD2] text-[#C62828]'}`}>
                          <span className="text-lg mt-[-2px]">{f.success ? '✅' : '⚠️'}</span>
                          <div>
                            <span className="font-semibold block mb-1">{f.name}</span>
                            {f.msg}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>

              <div 
                id="workspace-container"
                ref={containerRef} 
                className="flex-1 relative p-8 pt-24 flex justify-center items-start gap-12 overflow-auto custom-scrollbar"
                onMouseMove={handleMouseMove}
                onMouseLeave={() => setActivePin(null)}
              >
                <svg className="absolute top-0 left-0 w-full h-full pointer-events-none z-20" style={{ minHeight: '100%', minWidth: '100%' }}>
                  {wireCoords.map(wire => (
                    <g key={wire.id} className="pointer-events-auto cursor-pointer group" onClick={() => removeConnection(wire.id)}>
                      <path d={createCurve(wire.x1, wire.y1, wire.x2, wire.y2)} stroke="transparent" strokeWidth="20" fill="none" />
                      <path 
                        d={createCurve(wire.x1, wire.y1, wire.x2, wire.y2)} 
                        stroke={wire.color} strokeWidth="4" fill="none" strokeLinecap="round"
                        className="group-hover:stroke-ios-red group-hover:opacity-50 transition-colors drop-shadow-sm"
                      />
                    </g>
                  ))}
                  {activePin && activeCoords && (
                    <path 
                      d={createCurve(activeCoords.x, activeCoords.y, mousePos.x, mousePos.y)} 
                      stroke={activePin.color || '#8E8E93'} strokeWidth="4" strokeDasharray="6,6" fill="none" strokeLinecap="round"
                      className="opacity-60"
                    />
                  )}
                </svg>

                <div className="relative z-10 flex flex-col gap-6 items-center w-[260px] shrink-0 pb-20 mt-4">
                   <h3 className="text-ios-gray font-semibold text-[13px] mb-2 tracking-widest uppercase flex items-center gap-2 opacity-80">
                      <i className="fa-solid fa-arrow-right-from-bracket"></i> 輸出模組區
                   </h3>
                   {outputModules.length === 0 && (
                     <div className="w-full h-32 border-2 border-dashed border-ios-separator rounded-2xl flex flex-col items-center justify-center text-ios-gray font-medium">
                        <i className="fa-solid fa-plus text-2xl mb-2 opacity-30"></i>
                        請加入輸出模組
                     </div>
                   )}
                   {outputModules.map(mod => renderModuleCard(mod))}
                </div>

                <div className="relative z-10 bg-[#1C1C1E] p-7 rounded-[2rem] shadow-[0_20px_40px_rgba(0,0,0,0.2)] border border-[#2C2C2E] flex flex-col items-center select-none w-[30rem] self-start shrink-0 sticky top-4 mt-4">
                  <div className="text-[#FFCC00] font-bold mb-5 tracking-widest text-xs uppercase flex items-center gap-2 opacity-90">
                    <span className="w-2 h-2 rounded-full bg-[#FF3B30] inline-block shadow-[0_0_8px_#FF3B30]"></span>
                    ESP32 Sensor Shield V1
                  </div>
                  
                  <div className="flex w-full justify-between items-stretch">
                    
                    <div className="flex flex-col gap-1">
                      <div className="flex text-[10px] text-[#8E8E93] font-mono mb-2 text-center font-bold tracking-wider">
                        <span className="w-8">GPIO</span>
                        <span className="w-5">G</span>
                        <span className="w-5">V</span>
                        <span className="w-5">S</span>
                      </div>
                      {LEFT_PINS.map(pin => (
                        <div key={pin.id} className="flex items-center gap-1.5 mb-0.5">
                          <span className="text-[#F2F2F7] font-mono text-[10px] w-8 text-right pr-2 font-medium opacity-80">{pin.label}</span>
                          {pin.type === 'io' ? (
                            <React.Fragment>
                              <PinButton type="shield" id={`${pin.id}_G`} pinColor="black" activePin={activePin} connections={connections} onClick={handlePinClick} />
                              <PinButton type="shield" id={`${pin.id}_V`} pinColor="red" activePin={activePin} connections={connections} onClick={handlePinClick} />
                              <PinButton type="shield" id={`${pin.id}_S`} pinColor="blue" activePin={activePin} connections={connections} onClick={handlePinClick} />
                            </React.Fragment>
                          ) : (
                            <React.Fragment>
                              <div className="w-5 h-5"></div>
                              <div className="w-5 h-5"></div>
                              <PinButton type="shield" id={`${pin.id}_S`} pinColor={pin.color} activePin={activePin} connections={connections} onClick={handlePinClick} />
                            </React.Fragment>
                          )}
                        </div>
                      ))}
                    </div>

                    <div className="w-24 bg-[#D1D1D6] mx-5 border-4 border-[#3A3A3C] rounded-xl flex flex-col justify-between py-6 items-center shadow-inner relative flex-1">
                      <div className="w-16 h-12 border-b-2 border-[#8E8E93] flex flex-col justify-evenly px-1 pb-1">
                        <div className="w-full h-1 bg-[#C68926] rounded-sm"></div>
                        <div className="w-10 h-1 bg-[#C68926] rounded-sm"></div>
                        <div className="w-full h-1 bg-[#C68926] rounded-sm"></div>
                      </div>
                      <div className="text-[#1C1C1E] font-bold text-[13px] transform -rotate-90 tracking-widest flex items-center gap-2 my-auto whitespace-nowrap opacity-80">
                        <i className="fa-brands fa-bluetooth"></i>
                        ESP-WROOM-32
                      </div>
                      <div className="flex gap-4 pb-4">
                        <div className="w-3 h-3 bg-[#8E8E93] rounded-full shadow-inner"></div>
                        <div className="w-3 h-3 bg-[#8E8E93] rounded-full shadow-inner"></div>
                      </div>
                    </div>

                    <div className="flex flex-col gap-1">
                      <div className="flex text-[10px] text-[#8E8E93] font-mono mb-2 text-center font-bold tracking-wider">
                        <span className="w-5">G</span>
                        <span className="w-5">V</span>
                        <span className="w-5">S</span>
                        <span className="w-8">GPIO</span>
                      </div>
                      {RIGHT_PINS.map(pin => (
                        <div key={pin.id} className="flex items-center gap-1.5 mb-0.5">
                          {pin.type === 'io' ? (
                            <React.Fragment>
                              <PinButton type="shield" id={`${pin.id}_G`} pinColor="black" activePin={activePin} connections={connections} onClick={handlePinClick} />
                              <PinButton type="shield" id={`${pin.id}_V`} pinColor="red" activePin={activePin} connections={connections} onClick={handlePinClick} />
                              <PinButton type="shield" id={`${pin.id}_S`} pinColor="blue" activePin={activePin} connections={connections} onClick={handlePinClick} />
                            </React.Fragment>
                          ) : (
                            <React.Fragment>
                              <div className="w-5 h-5"></div>
                              <div className="w-5 h-5"></div>
                              <PinButton type="shield" id={`${pin.id}_S`} pinColor={pin.color} activePin={activePin} connections={connections} onClick={handlePinClick} />
                            </React.Fragment>
                          )}
                          <span className="text-[#F2F2F7] font-mono text-[10px] w-8 pl-2 font-medium opacity-80">{pin.label}</span>
                        </div>
                      ))}
                    </div>

                  </div>
                  
                  <div className="mt-6 pt-4 border-t border-[#3A3A3C] w-full flex justify-around">
                  <div>
                    <div className="text-[10px] text-[#8E8E93] font-medium text-center mb-1.5 tracking-wider">I2C</div>
                    <div className="flex justify-center gap-1.5">
                      <PinButton type="shield" id="I2C_SCL" pinColor="blue" activePin={activePin} connections={connections} onClick={handlePinClick} />
                      <PinButton type="shield" id="I2C_SDA" pinColor="blue" activePin={activePin} connections={connections} onClick={handlePinClick} />
                      <PinButton type="shield" id="I2C_V" pinColor="red" activePin={activePin} connections={connections} onClick={handlePinClick} />
                      <PinButton type="shield" id="I2C_G" pinColor="black" activePin={activePin} connections={connections} onClick={handlePinClick} />
                    </div>
                  </div>
                  <div>
                    <div className="text-[10px] text-[#8E8E93] font-medium text-center mb-1.5 tracking-wider">UART</div>
                    <div className="flex justify-center gap-1.5">
                      <PinButton type="shield" id="UART_TX" pinColor="blue" activePin={activePin} connections={connections} onClick={handlePinClick} />
                      <PinButton type="shield" id="UART_RX" pinColor="blue" activePin={activePin} connections={connections} onClick={handlePinClick} />
                    </div>
                  </div>
                </div>

              </div>

              <div className="relative z-10 flex flex-col gap-6 items-center w-[260px] shrink-0 pb-20 mt-4">
                 <h3 className="text-ios-gray font-semibold text-[13px] mb-2 tracking-widest uppercase flex items-center gap-2 opacity-80">
                    <i className="fa-solid fa-arrow-right-to-bracket"></i> 輸入模組區
                 </h3>
                 {inputModules.length === 0 && (
                   <div className="w-full h-32 border-2 border-dashed border-ios-separator rounded-2xl flex flex-col items-center justify-center text-ios-gray font-medium">
                      <i className="fa-solid fa-plus text-2xl mb-2 opacity-30"></i>
                      請加入輸入模組
                   </div>
                 )}
                 {inputModules.map(mod => renderModuleCard(mod))}
              </div>

            </div>
            
          </main>
        </div>
      </div>
    );
  }

  function PinButton({ type, id, pinColor, activePin, connections, onClick }) {
      const isActive = activePin?.type === type && activePin?.id === id;
      const isConnected = connections.some(c => c.shieldPin === id);
      
      const pinHex = {
        'black': '#1C1C1E',
        'red': '#FF3B30',
        'blue': '#007AFF'
      }[pinColor] || pinColor; 

      const pinDotColor = isConnected || isActive ? 'bg-[#FFCC00]' : 'bg-[#D1D1D6]';

      return (
        <button
          id={`pin-${type}-${id}`}
          onClick={() => onClick(type, id, pinHex)}
          className={`w-5 h-5 flex items-center justify-center rounded-[4px] border-[1.5px] transition-all relative ${
            isActive ? 'border-[#FFCC00] scale-110 z-10' : 'border-[#3A3A3C] hover:border-[#8E8E93]'
          }`}
          style={{ backgroundColor: pinHex === '#1C1C1E' ? '#2C2C2E' : pinHex }}
          title={`擴充板腳位 ${id}`}
        >
          <div className="absolute inset-0 bg-gradient-to-b from-white/20 to-transparent rounded-sm pointer-events-none"></div>
          <div className={`w-2 h-2 rounded-[2px] shadow-sm relative z-10 ${pinDotColor}`}></div>
        </button>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
